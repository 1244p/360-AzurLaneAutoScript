name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 16 * * *'   # Every day at 16:00 UTC (00:00 Beijing time)
  workflow_dispatch:        # Allow manual trigger from GitHub web UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global merge.ours.driver true
          git config user.name "1244p"
          git config user.email "a3067608187@gmail.com"

      - name: Add upstream and sync
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/LmeSzinc/AzurLaneAutoScript.git
          git fetch upstream
          git fetch origin
          git merge origin/master --no-edit || true
          if ! git merge upstream/master --no-edit; then
            echo "Merge conflict detected, aborting merge"
            git merge --abort
          fi
          for i in 1 2 3; do
            if git push origin master; then
              break
            fi
            echo "Push rejected, refreshing origin/master and retrying (${i}/3)"
            git fetch origin
            git merge origin/master --no-edit || true
            if [ "$i" -eq 3 ]; then
              echo "Failed to push after retries"
              exit 1
            fi
          done
